<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光影世界 - 电影推荐站</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #e50914;
            --primary-dark: #b90910;
            --bg-dark: #0a0a0f;
            --bg-card: #14141f;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --border-color: #2a2a3a;
        }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            padding-top: 70px;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(10,10,15,0.98);
            backdrop-filter: blur(10px);
            z-index: 100;
            border-bottom: 1px solid var(--border-color);
        }
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 70px;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo span { color: var(--text-primary); }
        .search-box {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.08);
            border-radius: 30px;
            padding: 8px 20px;
            border: 1px solid var(--border-color);
            width: 280px;
        }
        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 0.95rem;
        }
        .search-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
        }
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.5rem;
        }
        .mobile-nav {
            display: none;
            padding: 20px;
            border-top: 1px solid var(--border-color);
        }
        .mobile-nav.active { display: block; }
        .mobile-nav-links { list-style: none; }
        .mobile-nav-links li { margin: 10px 0; }
        .mobile-nav-links a { color: var(--text-secondary); }

        .categories-section {
            padding: 30px 24px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .category-tag {
            padding: 10px 24px;
            background: var(--bg-card);
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid var(--border-color);
        }
        .category-tag:hover { border-color: var(--primary); color: var(--primary); }
        .category-tag.active { background: var(--primary); border-color: var(--primary); }

        .movies-section {
            padding: 20px 24px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .section-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title::before {
            content: '';
            width: 4px;
            height: 22px;
            background: var(--primary);
            border-radius: 2px;
        }
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }
        .movie-card {
            background: var(--bg-card);
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid var(--border-color);
        }
        .movie-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }
        .movie-poster {
            position: relative;
            aspect-ratio: 2/3;
            overflow: hidden;
        }
        .movie-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s;
        }
        .movie-card:hover .movie-poster img { transform: scale(1.05); }
        .movie-rating {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .movie-rating .star { color: #f39c12; }
        .movie-info {
            padding: 14px;
        }
        .movie-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .movie-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
        }
        .movie-tag {
            font-size: 0.75rem;
            padding: 3px 8px;
            background: rgba(255,255,255,0.08);
            border-radius: 4px;
            color: var(--text-secondary);
        }
        .movie-preview {
            display: none;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border-color);
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .movie-card:hover .movie-preview { display: block; }
        .movie-play-btn {
            display: none;
            margin-top: 12px;
            padding: 8px 16px;
            background: var(--primary);
            border-radius: 6px;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .movie-card:hover .movie-play-btn { display: block; }

        footer {
            background: var(--bg-card);
            padding: 30px 24px;
            margin-top: 50px;
            border-top: 1px solid var(--border-color);
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 200;
            overflow-y: auto;
        }
        .modal-overlay.active { display: block; }
        .modal-content {
            max-width: 1000px;
            margin: 100px auto;
            padding: 0 24px 40px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
        }
        .close-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 2.5rem;
            cursor: pointer;
            line-height: 1;
        }
        .close-btn:hover { color: var(--primary); }
        .detail-main {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 35px;
        }
        .detail-poster {
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }
        .detail-poster img { width: 100%; }
        .detail-title {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 15px;
        }
        .detail-rating {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .detail-rating .star { color: #f39c12; font-size: 1.4rem; }
        .detail-rating .value { font-size: 1.8rem; font-weight: 700; color: #f39c12; }
        .detail-meta {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }
        .meta-item { display: flex; flex-direction: column; }
        .meta-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 4px; }
        .meta-value { color: var(--text-primary); }
        .detail-desc {
            line-height: 1.8;
            color: var(--text-secondary);
            margin-bottom: 25px;
        }
        .btn {
            padding: 12px 28px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }
        .similar-section {
            margin-top: 40px;
            padding-top: 40px;
            border-top: 1px solid var(--border-color);
        }
        .similar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }
        .similar-card {
            cursor: pointer;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s;
        }
        .similar-card:hover { transform: translateY(-4px); }
        .similar-card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
        }
        .similar-card-title {
            margin-top: 8px;
            font-size: 0.85rem;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .search-results {
            padding: 30px 24px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .search-title {
            font-size: 1.5rem;
            margin-bottom: 25px;
        }

        @media (max-width: 768px) {
            .search-box { width: 180px; }
            .mobile-menu-btn { display: block; }
            .detail-main { grid-template-columns: 1fr; }
            .detail-title { font-size: 1.8rem; }
            .detail-meta { grid-template-columns: 1fr; }
            .movies-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .similar-grid { grid-template-columns: repeat(4, 1fr); }
        }
        @media (max-width: 480px) {
            .movies-grid { grid-template-columns: repeat(2, 1fr); }
            .similar-grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <a href="#" class="logo">🎬 <span>光影世界</span></a>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索电影、演员、导演...">
                <button class="search-btn" id="searchBtn">🔍</button>
            </div>
            <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        </div>
        <nav class="mobile-nav" id="mobileNav">
            <ul class="mobile-nav-links">
                <li><a href="#" data-cat="all">全部</a></li>
                <li><a href="#" data-cat="action">动作</a></li>
                <li><a href="#" data-cat="comedy">喜剧</a></li>
                <li><a href="#" data-cat="scifi">科幻</a></li>
                <li><a href="#" data-cat="suspense">悬疑</a></li>
                <li><a href="#" data-cat="animation">动画</a></li>
            </ul>
        </nav>
    </header>

    <section class="categories-section">
        <div class="categories" id="categories">
            <span class="category-tag active" data-cat="all">全部</span>
            <span class="category-tag" data-cat="action">动作</span>
            <span class="category-tag" data-cat="comedy">喜剧</span>
            <span class="category-tag" data-cat="scifi">科幻</span>
            <span class="category-tag" data-cat="suspense">悬疑</span>
            <span class="category-tag" data-cat="love">爱情</span>
            <span class="category-tag" data-cat="animation">动画</span>
        </div>
    </section>

    <section class="movies-section">
        <h2 class="section-title">高分推荐</h2>
        <div class="movies-grid" id="topRatedGrid"></div>
    </section>

    <section class="movies-section">
        <h2 class="section-title">全部影片</h2>
        <div class="movies-grid" id="allMoviesGrid"></div>
    </section>

    <section class="search-results" id="searchResults" style="display: none;">
        <h2 class="search-title" id="searchTitle">搜索结果</h2>
        <div class="movies-grid" id="searchGrid"></div>
    </section>

    <div class="modal-overlay" id="movieModal">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <footer>
        <p>© 2024 光影世界 - 用心推荐每一部好电影</p>
    </footer>

    <script>
        const movies = [
            { id: 1, title: "肖申克的救赎", rating: 9.7, type: "剧情/犯罪", typeTags: ["drama", "crime"], director: "弗兰克·德拉邦特", actors: "蒂姆·罗宾斯 / 摩根·弗里曼", year: 1994, region: "美国", poster: "https://image.tmdb.org/t/p/w500/q6y0Go1tsGEsmtFryDOJo3dEmqu.jpg", desc: "一场谋杀案使银行家安迪蒙冤入狱，在监狱的岁月里，他结识了瑞德。安迪凭借自己的智慧和毅力，不仅在监狱里建立了图书馆，还帮助狱友们获得知识。最终，安迪用一把小锤子挖出了一条通往自由的隧道，在一个风雨交加的夜晚成功越狱，开始了新的生活。", playUrl: "https://so.iqiyi.com/so/q_肖申克的救赎" },
            { id: 2, title: "阿甘正传", rating: 9.5, type: "剧情/爱情", typeTags: ["drama", "love"], director: "罗伯特·泽米吉斯", actors: "汤姆·汉克斯 / 罗宾·怀特", year: 1994, region: "美国", poster: "https://image.tmdb.org/t/p/w500/sy6DvAu72kjoseZEjocnm2ZZ09i.jpg", desc: "阿甘是个智商只有75的低能儿，但他天性善良纯真。他听从妈妈的话，不停地跑，从小学跑到大学，从越南战场跑到总统身边。他参加过越战，打过乒乓球，捕过虾，还创办了自己的公司。阿甘的一生充满了传奇，而他对珍妮的爱始终不渝。", playUrl: "https://so.iqiyi.com/so/q_阿甘正传" },
            { id: 3, title: "泰坦尼克号", rating: 9.4, type: "爱情/灾难", typeTags: ["love", "disaster"], director: "詹姆斯·卡梅隆", actors: "莱昂纳多·迪卡普里奥 / 凯特·温丝莱特", year: 1997, region: "美国", poster: "https://image.tmdb.org/t/p/w500/yDI6D5ZQh67YU4r2gX3mGy30GSt.jpg", desc: "1912年，豪华游轮泰坦尼克号开始了它的处女航。贫穷画家杰克和富家女露丝在船上相遇并相爱。然而，游轮撞上了冰山，即将沉没。在生死关头，杰克把生存的机会让给了露丝，自己则永远沉入了冰冷的大西洋。", playUrl: "https://so.iqiyi.com/so/q_泰坦尼克号" },
            { id: 4, title: "盗梦空间", rating: 9.3, type: "科幻/悬疑", typeTags: ["scifi", "suspense"], director: "克里斯托弗·诺兰", actors: "莱昂纳多·迪卡普里奥 / 约瑟夫·高登-莱维特", year: 2010, region: "美国/英国", poster: "https://image.tmdb.org/t/p/w500/9gk7adHYeDvHkCSEqAvQNLV5Uge.jpg", desc: "道姆·柯布是一名专门从事意识深层盗窃的高手。他能够潜入目标的梦境中窃取机密。然而，一次失败的任务让他被迫接受一项看似不可能的任务：在目标的潜意识中植入一个想法，也就是'盗梦'的逆操作——'植梦'。", playUrl: "https://so.iqiyi.com/so/q_盗梦空间" },
            { id: 5, title: "星际穿越", rating: 9.4, type: "科幻/冒险", typeTags: ["scifi", "adventure"], director: "克里斯托弗·诺兰", actors: "马修·麦康纳 / 安妮·海瑟薇", year: 2014, region: "美国/英国", poster: "https://image.tmdb.org/t/p/w500/gEU2QniE6E77NI6lCU6MxlNBvIx.jpg", desc: "在不远的未来，地球气候已经不适合人类生存。一队探险队员承担起人类历史上最重要的任务：穿越虫洞，寻找人类新的家园。宇航员库珀必须在孩子和人类的未来之间做出选择。", playUrl: "https://so.iqiyi.com/so/q_星际穿越" },
            { id: 6, title: "楚门的世界", rating: 9.3, type: "剧情/喜剧", typeTags: ["drama", "comedy"], director: "彼得·威尔", actors: "金·凯瑞 / 劳拉·琳妮", year: 1998, region: "美国", poster: "https://image.tmdb.org/t/p/w500/6V6Vl50GfX6f09bH86p5lnj7dml.jpg", desc: "楚门·伯班克从出生起就活在一个巨大的摄影棚里，他的一举一动都被直播给全世界观众。直到有一天，他发现了这个巨大的谎言。楚门决定逃离这个虚假的世界，去寻找真正的自由和爱情。", playUrl: "https://so.iqiyi.com/so/q_楚门的世界" },
            { id: 7, title: "教父", rating: 9.3, type: "犯罪/剧情", typeTags: ["crime", "drama"], director: "弗朗西斯·福特·科波拉", actors: "马龙·白兰度 / 阿尔·帕西诺", year: 1972, region: "美国", poster: "https://image.tmdb.org/t/p/w500/3bhkrj58Vtu7enYsRolD1fZdja1.jpg", desc: "维多·柯里昂是纽约黑手党柯里昂家族的族长，他被称为教父。他的小儿子迈克尔原本不想参与家族事务，但在父亲遇袭后，迈克尔被迫卷入了黑手党世界。他一步步成长为新一代教父，但也付出了沉重的代价。", playUrl: "https://so.iqiyi.com/so/q_教父" },
            { id: 8, title: "蝙蝠侠：黑暗骑士", rating: 9.2, type: "动作/犯罪", typeTags: ["action", "crime"], director: "克里斯托弗·诺兰", actors: "克里斯蒂安·贝尔 / 希斯·莱杰", year: 2008, region: "美国/英国", poster: "https://image.tmdb.org/t/p/w500/qJ2tW6WMUDux911r6m7haRef0WH.jpg", desc: "蝙蝠侠在哥谭市打击犯罪已经两年了，城市的犯罪率有所下降。然而，一个新的敌人出现了——小丑。他带来了混乱和无政府主义，考验着蝙蝠侠的信念和哥谭市的道德底线。", playUrl: "https://so.iqiyi.com/so/q_蝙蝠侠黑暗骑士" },
            { id: 9, title: "这个杀手不太冷", rating: 9.4, type: "动作/剧情", typeTags: ["action", "drama"], director: "吕克·贝松", actors: "让·雷诺 / 娜塔莉·波特曼", year: 1994, region: "法国/美国", poster: "https://image.tmdb.org/t/p/w500/4uX5wzZbr88uQLIqT3yK6z0JFmH.jpg", desc: "莱昂是一名职业杀手，独自一人生活。一天，邻居家的小女孩玛蒂尔达因为全家被杀害而逃到莱昂家。莱昂收留了她，并教她成为一名杀手。两人之间产生了深厚的感情，但这份感情却注定以悲剧收场。", playUrl: "https://so.iqiyi.com/so/q_这个杀手不太冷" },
            { id: 10, title: "千与千寻", rating: 9.4, type: "动画/奇幻", typeTags: ["animation", "fantasy"], director: "宫崎骏", actors: "柊瑠美 / 入野自由", year: 2001, region: "日本", poster: "https://image.tmdb.org/t/p/w500/39wmItIWsg5sZMyRUHLkWBcuVCM.jpg", desc: "千寻和爸爸妈妈一起驱车前往新家，在郊外的小路上不慎进入了神秘的隧道。他们来到了一个奇异的世界，爸爸妈妈因为贪吃变成了猪。千寻必须在汤屋工作来拯救父母，在这个过程中她经历了成长和冒险。", playUrl: "https://so.iqiyi.com/so/q_千与千寻" },
            { id: 11, title: "寻梦环游记", rating: 9.1, type: "动画/冒险", typeTags: ["animation", "adventure"], director: "李·昂克里奇", actors: "安东尼·冈萨雷斯 / 盖尔·加西亚·贝纳尔", year: 2017, region: "美国", poster: "https://image.tmdb.org/t/p/w500/eKi8dIrr8voobbaGzDpe8w0PVbC.jpg", desc: "热爱音乐的米格尔不幸地出生在一个痛恨音乐的家庭里。在亡灵节那天，他意外进入了亡灵世界。在那里，他找到了自己的曾曾祖父，并发现了家族的秘密。最终，米格尔帮助家人解开了多年的心结。", playUrl: "https://so.iqiyi.com/so/q_寻梦环游记" },

        const categoryMap = { 'all': '全部', 'action': '动作', 'comedy': '喜剧', 'scifi': '科幻', 'suspense': '悬疑', 'love': '爱情', 'animation': '动画' };

        function renderMovieCard(movie) {
            return `<div class="movie-card" onclick="showMovieDetail(${movie.id})"><div class="movie-poster"><img src="${movie.poster}" alt="${movie.title}" loading="lazy"><div class="movie-rating"><span class="star">⭐</span>${movie.rating}</div></div><div class="movie-info"><h3 class="movie-title">${movie.title}</h3><div class="movie-tags"><span class="movie-tag">${movie.type}</span><span class="movie-tag">${movie.year}</span></div><p class="movie-preview">${movie.desc.slice(0, 60)}...</p><div class="movie-play-btn" onclick="event.stopPropagation(); playMovie('${movie.playUrl}')">▶ 立即播放</div></div></div>`;
        }

        function renderSections() {
            const topRated = [...movies].sort((a,b) => b.rating - a.rating).slice(0, 8);
            document.getElementById('topRatedGrid').innerHTML = topRated.map(renderMovieCard).join('');
            document.getElementById('allMoviesGrid').innerHTML = movies.map(renderMovieCard).join('');
        }

        function showMovieDetail(movieId) {
            const movie = movies.find(m => m.id === movieId);
            if (!movie) return;
            
            const similarMovies = movies.filter(m => m.id !== movieId && m.typeTags.some(tag => movie.typeTags.includes(tag))).slice(0, 6);
            
            const modal = document.getElementById('movieModal');
            const content = document.getElementById('modalContent');
            
            content.innerHTML = `<div class="modal-header"><h1 class="detail-title">${movie.title}</h1><button class="close-btn" onclick="closeModal()">×</button></div><div class="detail-main"><div class="detail-poster"><img src="${movie.poster}" alt="${movie.title}"></div><div class="detail-info"><div class="detail-rating"><span class="star">⭐</span><span class="value">${movie.rating}</span></div><div class="detail-meta"><div class="meta-item"><span class="meta-label">类型</span><span class="meta-value">${movie.type}</span></div><div class="meta-item"><span class="meta-label">导演</span><span class="meta-value">${movie.director}</span></div><div class="meta-item"><span class="meta-label">主演</span><span class="meta-value">${movie.actors}</span></div><div class="meta-item"><span class="meta-label">上映时间</span><span class="meta-value">${movie.year}</span></div><div class="meta-item"><span class="meta-label">地区</span><span class="meta-value">${movie.region}</span></div></div><p class="detail-desc">${movie.desc}</p><button class="btn btn-primary" onclick="playMovie('${movie.playUrl}')">▶ 立即播放</button></div></div><div class="similar-section"><h3 class="section-title">同类型推荐</h3><div class="similar-grid">${similarMovies.map(m => `<div class="similar-card" onclick="showMovieDetail(${m.id})"><img src="${m.poster}" alt="${m.title}"><p class="similar-card-title">${m.title}</p></div>`).join('')}</div></div>`;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('movieModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        function playMovie(url) {
            window.open(url, '_blank');
        }

        function filterByCategory(category) {
            document.querySelectorAll('.category-tag').forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-cat="${category}"]`).classList.add('active');
            
            document.querySelectorAll('.movies-section').forEach(s => s.style.display = '');
            document.getElementById('searchResults').style.display = 'none';
            
            if (category === 'all') {
                renderSections();
            } else {
                const filtered = movies.filter(m => m.typeTags.includes(category) || m.type.includes(categoryMap[category]));
                document.getElementById('topRatedGrid').innerHTML = [...filtered].sort((a,b) => b.rating - a.rating).slice(0, 8).map(renderMovieCard).join('');
                document.getElementById('allMoviesGrid').innerHTML = filtered.map(renderMovieCard).join('');
            }
        }

        function initSearch() {
            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');
            
            function performSearch() {
                const query = searchInput.value.trim();
                if (!query) { filterByCategory('all'); return; }
                
                const results = movies.filter(m => m.title.includes(query) || m.actors.includes(query) || m.director.includes(query));
                
                document.getElementById('searchTitle').innerHTML = `搜索结果："${query}" (${results.length}部影片)`;
                document.getElementById('searchGrid').innerHTML = results.map(renderMovieCard).join('');
                
                document.querySelectorAll('.movies-section').forEach(s => s.style.display = 'none');
                document.getElementById('searchResults').style.display = 'block';
            }
            
            searchBtn.addEventListener('click', performSearch);
            searchInput.addEventListener('keyup', (e) => { if (e.key === 'Enter') performSearch(); });
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderSections();
            initSearch();
            
            document.querySelectorAll('.category-tag').forEach(tag => {
                tag.addEventListener('click', () => filterByCategory(tag.dataset.cat));
            });
            
            document.querySelectorAll('.mobile-nav-links a').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    filterByCategory(link.dataset.cat);
                    document.getElementById('mobileNav').classList.remove('active');
                });
            });
            
            document.getElementById('mobileMenuBtn').addEventListener('click', () => {
                document.getElementById('mobileNav').classList.toggle('active');
            });
            
            document.getElementById('movieModal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('movieModal')) closeModal();
            });
        });
    </script>
</body>
</html>
