<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光影世界 - 电影推荐站</title>
    <style>
        :root {
            --primary-color: #e74c3c;
            --secondary-color: #3498db;
            --bg-dark: #0a0a0f;
            --bg-card: #151520;
            --bg-hover: #1f1f2e;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --border-color: #2a2a3a;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; background: var(--bg-dark); color: var(--text-primary); min-height: 100vh; }
        a { text-decoration: none; color: inherit; }
        
        /* Header */
        header { position: fixed; top: 0; left: 0; right: 0; background: rgba(10, 10, 15, 0.95); backdrop-filter: blur(10px); z-index: 100; border-bottom: 1px solid var(--border-color); }
        .header-content { max-width: 1400px; margin: 0 auto; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 65px; }
        .logo { font-size: 1.5rem; font-weight: bold; color: var(--primary-color); }
        .logo span { color: var(--text-primary); }
        
        /* Desktop Navigation */
        .nav-links { display: flex; gap: 30px; list-style: none; }
        .nav-links a { color: var(--text-secondary); transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--primary-color); }
        
        /* Search */
        .search-box { display: flex; align-items: center; background: var(--bg-card); border-radius: 30px; padding: 8px 15px; border: 1px solid var(--border-color); }
        .search-box input { background: transparent; border: none; outline: none; color: var(--text-primary); padding: 5px 10px; width: 200px; }
        .search-box button { background: none; border: none; color: var(--text-secondary); cursor: pointer; }
        
        /* Mobile Menu */
        .mobile-menu-btn { display: none; background: none; border: none; color: var(--text-primary); font-size: 1.5rem; }
        .mobile-nav { display: none; position: absolute; top: 65px; left: 0; right: 0; background: var(--bg-dark); border-bottom: 1px solid var(--border-color); padding: 20px; }
        .mobile-nav.active { display: block; }
        .mobile-nav-links { list-style: none; }
        .mobile-nav-links li { margin: 15px 0; }
        .mobile-nav-links a { color: var(--text-secondary); font-size: 1.1rem; }
        
        /* Hero Banner */
        .hero-section { margin-top: 65px; position: relative; height: 500px; overflow: hidden; }
        .hero-slider { position: relative; height: 100%; }
        .hero-slide { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-size: cover; background-position: center; opacity: 0; transition: opacity 0.5s; }
        .hero-slide.active { opacity: 1; }
        .hero-slide::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(180deg, rgba(10,10,15,0.3) 0%, rgba(10,10,15,0.9) 100%); }
        .hero-content { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 100px 50px; height: 100%; display: flex; flex-direction: column; justify-content: flex-end; }
        .hero-title { font-size: 3rem; margin-bottom: 15px; }
        .hero-rating { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .rating-star { color: #f39c12; }
        .hero-desc { font-size: 1.1rem; color: var(--text-secondary); margin-bottom: 25px; max-width: 600px; }
        .hero-buttons { display: flex; gap: 15px; }
        .btn { padding: 12px 30px; border-radius: 30px; font-weight: 600; transition: all 0.3s; border: none; cursor: pointer; }
        .btn-primary { background: var(--primary-color); color: white; }
        .btn-primary:hover { background: #c0392b; transform: scale(1.05); }
        .btn-secondary { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
        .btn-secondary:hover { background: rgba(255,255,255,0.2); }
        .hero-indicators { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; }
        .hero-indicator { width: 12px; height: 12px; border-radius: 50%; background: rgba(255,255,255,0.3); cursor: pointer; transition: all 0.3s; }
        .hero-indicator.active { background: var(--primary-color); width: 30px; border-radius: 6px; }
        
        /* Categories */
        .categories-section { padding: 40px 20px; max-width: 1400px; margin: 0 auto; }
        .section-title { font-size: 1.5rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .section-title::before { content: ''; width: 4px; height: 24px; background: var(--primary-color); border-radius: 2px; }
        .categories { display: flex; flex-wrap: wrap; gap: 15px; }
        .category-tag { padding: 10px 25px; background: var(--bg-card); border-radius: 25px; cursor: pointer; transition: all 0.3s; border: 1px solid var(--border-color); }
        .category-tag:hover, .category-tag.active { background: var(--primary-color); border-color: var(--primary-color); }
        
        /* Movies Grid */
        .movies-section { padding: 20px; max-width: 1400px; margin: 0 auto; }
        .movies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .movie-card { background: var(--bg-card); border-radius: 12px; overflow: hidden; cursor: pointer; transition: all 0.3s; border: 1px solid var(--border-color); }
        .movie-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.4); border-color: var(--primary-color); }
        .movie-poster { position: relative; aspect-ratio: 2/3; overflow: hidden; }
        .movie-poster img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .movie-card:hover .movie-poster img { transform: scale(1.1); }
        .movie-rating-badge { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); padding: 5px 10px; border-radius: 20px; font-size: 0.9rem; }
        .movie-info { padding: 15px; }
        .movie-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .movie-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        .movie-tag { font-size: 0.8rem; padding: 3px 8px; background: var(--bg-hover); border-radius: 4px; color: var(--text-secondary); }
        .movie-preview { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border-color); font-size: 0.85rem; color: var(--text-secondary); line-height: 1.5; }
        .movie-card:hover .movie-preview { display: block; }
        .movie-preview-btn { display: none; margin-top: 10px; padding: 8px 15px; background: var(--primary-color); border-radius: 20px; text-align: center; font-size: 0.9rem; }
        .movie-card:hover .movie-preview-btn { display: block; }
        
        /* Footer */
        footer { background: var(--bg-card); padding: 40px 20px; margin-top: 50px; border-top: 1px solid var(--border-color); }
        .footer-content { max-width: 1400px; margin: 0 auto; text-align: center; }
        .footer-links { display: flex; justify-content: center; gap: 30px; margin-bottom: 20px; flex-wrap: wrap; }
        .footer-links a { color: var(--text-secondary); transition: color 0.3s; }
        .footer-links a:hover { color: var(--primary-color); }
        .copyright { color: var(--text-secondary); font-size: 0.9rem; }
        
        /* Movie Detail Modal */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 200; overflow-y: auto; }
        .modal-overlay.active { display: block; }
        .modal-content { max-width: 1200px; margin: 80px auto; padding: 20px; }
        .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; }
        .close-btn { background: none; border: none; color: var(--text-secondary); font-size: 2rem; cursor: pointer; transition: color 0.3s; }
        .close-btn:hover { color: var(--primary-color); }
        .detail-main { display: grid; grid-template-columns: 1fr 2fr; gap: 40px; margin-bottom: 40px; }
        .detail-poster { position: relative; border-radius: 15px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .detail-poster img { width: 100%; }
        .detail-info { display: flex; flex-direction: column; }
        .detail-title { font-size: 2.5rem; margin-bottom: 15px; }
        .detail-subtitle { color: var(--text-secondary); margin-bottom: 20px; }
        .detail-meta-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 25px; }
        .meta-item { display: flex; flex-direction: column; }
        .meta-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 5px; }
        .meta-value { color: var(--text-primary); }
        .detail-desc { line-height: 1.8; color: var(--text-secondary); margin-bottom: 30px; }
        .detail-buttons { display: flex; gap: 15px; }
        
        /* Stills Gallery */
        .stills-section { margin-bottom: 40px; }
        .stills-container { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: thin; }
        .stills-container::-webkit-scrollbar { height: 6px; }
        .stills-container::-webkit-scrollbar-track { background: var(--bg-card); }
        .stills-container::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
        .still-item { flex-shrink: 0; width: 200px; border-radius: 8px; overflow: hidden; cursor: pointer; transition: transform 0.3s; }
        .still-item:hover { transform: scale(1.05); }
        .still-item img { width: 100%; height: 120px; object-fit: cover; }
        
        /* Similar Movies */
        .similar-section { margin-top: 40px; }
        .similar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .similar-card { cursor: pointer; transition: transform 0.3s; }
        .similar-card:hover { transform: translateY(-5px); }
        .similar-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 8px; }
        .similar-card-title { margin-top: 10px; font-size: 0.9rem; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* Search Results */
        .search-results { padding: 100px 20px; max-width: 1400px; margin: 0 auto; }
        .search-title { font-size: 1.8rem; margin-bottom: 30px; }
        .search-count { color: var(--text-secondary); }
        
        /* Responsive */
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .mobile-menu-btn { display: block; }
            .search-box input { width: 120px; }
            .hero-section { height: 400px; }
            .hero-content { padding: 80px 20px; }
            .hero-title { font-size: 2rem; }
            .hero-desc { font-size: 1rem; }
            .detail-main { grid-template-columns: 1fr; }
            .detail-title { font-size: 1.8rem; }
            .detail-meta-grid { grid-template-columns: 1fr; }
            .movies-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
            .similar-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
        }
    </style>
</head>

        function initHeroSlider() {
            const slider = document.getElementById('heroSlider');
            const indicators = document.getElementById('heroIndicators');
            const topMovies = [...movies].sort((a,b) => b.rating - a.rating).slice(0, 5);
            
            topMovies.forEach((movie, index) => {
                const slide = document.createElement('div');
                slide.className = `hero-slide ${index === 0 ? 'active' : ''}`;
                slide.style.backgroundImage = `url(${movie.poster})`;
                slide.innerHTML = `
                    <div class="hero-content">
                        <div class="hero-rating">
                            <span class="rating-star">⭐</span>
                            <span>${movie.rating}</span>
                        </div>
                        <h1 class="hero-title">${movie.title}</h1>
                        <p class="hero-desc">${movie.desc.slice(0, 100)}...</p>
                        <div class="hero-buttons">
                            <button class="btn btn-primary" onclick="playMovie('${movie.playUrl}')">立即播放</button>
                            <button class="btn btn-secondary" onclick="showMovieDetail(${movie.id})">查看详情</button>
                        </div>
                    </div>
                `;
                slider.appendChild(slide);
                
                const indicator = document.createElement('div');
                indicator.className = `hero-indicator ${index === 0 ? 'active' : ''}`;
                indicator.addEventListener('click', () => setSlide(index));
                indicators.appendChild(indicator);
            });
            
            let currentSlide = 0;
            setInterval(() => {
                currentSlide = (currentSlide + 1) % topMovies.length;
                setSlide(currentSlide);
            }, 5000);
            
            function setSlide(index) {
                document.querySelectorAll('.hero-slide').forEach((s, i) => s.classList.toggle('active', i === index));
                document.querySelectorAll('.hero-indicator').forEach((i, idx) => i.classList.toggle('active', idx === index));
                currentSlide = index;
            }
        }

        function renderMovieCard(movie) {
            return `
                <div class="movie-card" onclick="showMovieDetail(${movie.id})">
                    <div class="movie-poster">
                        <img src="${movie.poster}" alt="${movie.title}" loading="lazy">
                        <div class="movie-rating-badge">⭐ ${movie.rating}</div>
                    </div>
                    <div class="movie-info">
                        <h3 class="movie-title">${movie.title}</h3>
                        <div class="movie-meta">
                            <span class="movie-tag">${movie.type}</span>
                            <span class="movie-tag">${movie.year}</span>
                        </div>
                        <p class="movie-preview">${movie.desc.slice(0, 80)}...</p>
                        <div class="movie-preview-btn" onclick="event.stopPropagation(); playMovie('${movie.playUrl}')">▶ 立即播放</div>
                    </div>
                </div>
            `;
        }

        function renderSections() {
            const newReleases = [...movies].sort((a,b) => b.year - a.year).slice(0, 6);
            document.getElementById('newReleasesGrid').innerHTML = newReleases.map(renderMovieCard).join('');
            
            const topRated = [...movies].sort((a,b) => b.rating - a.rating).slice(0, 6);
            document.getElementById('topRatedGrid').innerHTML = topRated.map(renderMovieCard).join('');
            
            document.getElementById('allMoviesGrid').innerHTML = movies.map(renderMovieCard).join('');
        }

        function showMovieDetail(movieId) {
            const movie = movies.find(m => m.id === movieId);
            if (!movie) return;
            
            const similarMovies = movies.filter(m => 
                m.id !== movieId && 
                m.typeTags.some(tag => movie.typeTags.includes(tag))
            ).slice(0, 6);
            
            const modal = document.getElementById('movieModal');
            const content = document.getElementById('modalContent');
            
            content.innerHTML = `
                <div class="modal-header">
                    <h1 class="detail-title">${movie.title}</h1>
                    <button class="close-btn" onclick="closeModal()">×</button>
                </div>
                <div class="detail-main">
                    <div class="detail-poster">
                        <img src="${movie.poster}" alt="${movie.title}">
                    </div>
                    <div class="detail-info">
                        <p class="detail-subtitle">${movie.titleEn} | ⭐ ${movie.rating}分</p>
                        <div class="detail-meta-grid">
                            <div class="meta-item"><span class="meta-label">类型</span><span class="meta-value">${movie.type}</span></div>
                            <div class="meta-item"><span class="meta-label">导演</span><span class="meta-value">${movie.director}</span></div>
                            <div class="meta-item"><span class="meta-label">主演</span><span class="meta-value">${movie.actors}</span></div>
                            <div class="meta-item"><span class="meta-label">上映时间</span><span class="meta-value">${movie.year}</span></div>
                            <div class="meta-item"><span class="meta-label">地区</span><span class="meta-value">${movie.region}</span></div>
                            <div class="meta-item"><span class="meta-label">评分</span><span class="meta-value">⭐ ${movie.rating}</span></div>
                        </div>
                        <p class="detail-desc">${movie.desc}</p>
                        <div class="detail-buttons">
                            <button class="btn btn-primary" onclick="playMovie('${movie.playUrl}')">▶ 立即播放</button>
                        </div>
                    </div>
                </div>
                <div class="stills-section">
                    <h3 class="section-title">精彩剧照</h3>
                    <div class="stills-container">
                        ${movie.stills.map((still, idx) => `<div class="still-item"><img src="${still}" alt="剧照${idx+1}"></div>`).join('')}
                    </div>
                </div>
                <div class="similar-section">
                    <h3 class="section-title">同类型推荐</h3>
                    <div class="similar-grid">
                        ${similarMovies.map(m => `<div class="similar-card" onclick="showMovieDetail(${m.id})"><img src="${m.poster}" alt="${m.title}"><p class="similar-card-title">${m.title}</p></div>`).join('')}
                    </div>
                </div>
            `;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('movieModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        function playMovie(url) {
            window.open(url, '_blank');
        }

        function filterByCategory(category) {
            document.querySelectorAll('.category-tag').forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-cat="${category}"]`).classList.add('active');
            
            const allSections = ['heroSection', 'categories', 'newReleasesGrid', 'topRatedGrid', 'allMoviesGrid'];
            const searchSection = document.getElementById('searchResults');
            
            allSections.forEach(id => document.getElementById(id).style.display = '');
            searchSection.style.display = 'none';
            
            if (category === 'all') {
                renderSections();
            } else {
                const filtered = movies.filter(m => m.typeTags.includes(category) || m.type.includes(categoryMap[category]));
                
                document.getElementById('newReleasesGrid').innerHTML = filtered.slice(0, 6).map(renderMovieCard).join('');
                document.getElementById('topRatedGrid').innerHTML = [...filtered].sort((a,b) => b.rating - a.rating).slice(0, 6).map(renderMovieCard).join('');
                document.getElementById('allMoviesGrid').innerHTML = filtered.map(renderMovieCard).join('');
            }
        }

        function initSearch() {
            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');
            
            function performSearch() {
                const query = searchInput.value.trim();
                if (!query) {
                    filterByCategory('all');
                    return;
                }
                
                const results = movies.filter(m => 
                    m.title.includes(query) || 
                    m.actors.includes(query) || 
                    m.director.includes(query)
                );
                
                document.getElementById('searchTitle').innerHTML = `搜索结果："${query}" <span class="search-count">(${results.length}部影片)</span>`;
                document.getElementById('searchGrid').innerHTML = results.map(renderMovieCard).join('');
                
                document.querySelectorAll('.hero-section, .categories-section, .movies-section').forEach(s => s.style.display = 'none');
                document.getElementById('searchResults').style.display = 'block';
            }
            
            searchBtn.addEventListener('click', performSearch);
            searchInput.addEventListener('keyup', (e) => {
                if (e.key === 'Enter') performSearch();
            });
        }

        function initNav() {
            document.querySelectorAll('.nav-links a, .mobile-nav-links a').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const page = link.dataset.page;
                    const cat = link.dataset.cat;
                    
                    if (page === 'home') {
                        filterByCategory('all');
                    } else if (cat) {
                        filterByCategory(cat);
                    }
                    
                    document.querySelectorAll('.nav-links a, .mobile-nav-links a').forEach(l => l.classList.remove('active'));
                    link.classList.add('active');
                    
                    document.getElementById('mobileNav').classList.remove('active');
                });
            });
            
            document.getElementById('mobileMenuBtn').addEventListener('click', () => {
                document.getElementById('mobileNav').classList.toggle('active');
            });
            
            document.querySelectorAll('.category-tag').forEach(tag => {
                tag.addEventListener('click', () => {
                    filterByCategory(tag.dataset.cat);
                });
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            initHeroSlider();
            renderSections();
            initSearch();
            initNav();
            
            document.getElementById('movieModal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('movieModal')) {
                    closeModal();
                }
            });
        });
    </script>
</body>
</html>
