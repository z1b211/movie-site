<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光影世界 - 电影推荐站</title>
    <style>
        :root {
            --primary-color: #e74c3c;
            --secondary-color: #3498db;
            --bg-dark: #0a0a0f;
            --bg-card: #151520;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; background: var(--bg-dark); color: var(--text-primary); min-height: 100vh; }
        header { position: fixed; top: 0; left: 0; right: 0; background: rgba(10,10,15,0.95); z-index: 100; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 65px; }
        .logo { font-size: 1.5rem; font-weight: bold; color: var(--primary-color); }
        .nav-links { display: flex; gap: 30px; list-style: none; }
        .nav-links a { color: var(--text-secondary); text-decoration: none; }
        .nav-links a:hover { color: var(--primary-color); }
        .search-box { display: flex; align-items: center; background: var(--bg-card); border-radius: 30px; padding: 8px 15px; }
        .search-box input { background: transparent; border: none; color: var(--text-primary); padding: 5px 10px; }
        .mobile-menu-btn { display: none; font-size: 1.5rem; color: var(--text-primary); background: none; border: none; }
        .hero-section { margin-top: 65px; height: 500px; position: relative; overflow: hidden; }
        .hero-slide { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-size: cover; background-position: center; opacity: 0; transition: opacity 0.5s; }
        .hero-slide.active { opacity: 1; }
        .hero-content { position: relative; z-index: 1; padding: 100px 50px; }
        .hero-title { font-size: 3rem; margin-bottom: 15px; }
        .hero-desc { color: var(--text-secondary); margin-bottom: 25px; }
        .btn { padding: 12px 30px; border-radius: 30px; border: none; cursor: pointer; font-weight: 600; }
        .btn-primary { background: var(--primary-color); color: white; }
        .categories-section { padding: 40px 20px; }
        .section-title { font-size: 1.5rem; margin-bottom: 20px; }
        .categories { display: flex; flex-wrap: wrap; gap: 15px; }
        .category-tag { padding: 10px 25px; background: var(--bg-card); border-radius: 25px; cursor: pointer; }
        .movies-section { padding: 20px; }
        .movies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .movie-card { background: var(--bg-card); border-radius: 12px; overflow: hidden; cursor: pointer; }
        .movie-poster { position: relative; aspect-ratio: 2/3; overflow: hidden; }
        .movie-poster img { width: 100%; height: 100%; object-fit: cover; }
        .movie-info { padding: 15px; }
        .movie-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 8px; }
        .movie-tag { font-size: 0.8rem; padding: 3px 8px; background: rgba(255,255,255,0.1); border-radius: 4px; color: var(--text-secondary); }
        footer { background: var(--bg-card); padding: 40px 20px; margin-top: 50px; text-align: center; }
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .mobile-menu-btn { display: block; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">🎬 光影世界</div>
        <nav>
            <ul class="nav-links">
                <li><a href="#">首页</a></li>
                <li><a href="#">动作</a></li>
                <li><a href="#">喜剧</a></li>
                <li><a href="#">科幻</a></li>
                <li><a href="#">悬疑</a></li>
                <li><a href="#">动画</a></li>
            </ul>
        </nav>
        <div class="search-box">
            <input type="text" placeholder="搜索电影...">
            <button>🔍</button>
        </div>
        <button class="mobile-menu-btn">☰</button>
    </header>

    <section class="hero-section">
        <div class="hero-slider" id="heroSlider"></div>
    </section>

    <section class="categories-section">
        <h2 class="section-title">分类浏览</h2>
        <div class="categories">
            <span class="category-tag">全部</span>
            <span class="category-tag">动作</span>
            <span class="category-tag">喜剧</span>
            <span class="category-tag">科幻</span>
            <span class="category-tag">悬疑</span>
            <span class="category-tag">爱情</span>
            <span class="category-tag">动画</span>
        </div>
    </section>

    <section class="movies-section">
        <h2 class="section-title">新片上线</h2>
        <div class="movies-grid" id="newReleasesGrid"></div>
    </section>

    <section class="movies-section">
        <h2 class="section-title">高分推荐</h2>
        <div class="movies-grid" id="topRatedGrid"></div>
    </section>

    <footer>
        <p>© 2024 光影世界</p>
    </footer>

    <script>
        const movies = [
            { id: 1, title: "肖申克的救赎", rating: 9.7, type: "剧情/犯罪", poster: "https://image.tmdb.org/t/p/w500/q6y0Go1tsGEsmtFryDOJo3dEmqu.jpg", playUrl: "https://so.iqiyi.com/so/q_肖申克的救赎" },
            { id: 2, title: "阿甘正传", rating: 9.5, type: "剧情/爱情", poster: "https://image.tmdb.org/t/p/w500/sy6DvAu72kjoseZEjocnm2ZZ09i.jpg", playUrl: "https://so.iqiyi.com/so/q_阿甘正传" },
            { id: 3, title: "泰坦尼克号", rating: 9.4, type: "爱情/灾难", poster: "https://image.tmdb.org/t/p/w500/yDI6D5ZQh67YU4r2gX3mGy30GSt.jpg", playUrl: "https://so.iqiyi.com/so/q_泰坦尼克号" },
            { id: 4, title: "盗梦空间", rating: 9.3, type: "科幻/悬疑", poster: "https://image.tmdb.org/t/p/w500/9gk7adHYeDvHkCSEqAvQNLV5Uge.jpg", playUrl: "https://so.iqiyi.com/so/q_盗梦空间" },
            { id: 5, title: "星际穿越", rating: 9.4, type: "科幻/冒险", poster: "https://image.tmdb.org/t/p/w500/gEU2QniE6E77NI6lCU6MxlNBvIx.jpg", playUrl: "https://so.iqiyi.com/so/q_星际穿越" },
            { id: 6, title: "楚门的世界", rating: 9.3, type: "剧情/喜剧", poster: "https://image.tmdb.org/t/p/w500/6V6Vl50GfX6f09bH86p5lnj7dml.jpg", playUrl: "https://so.iqiyi.com/so/q_楚门的世界" },
            { id: 7, title: "教父", rating: 9.3, type: "犯罪/剧情", poster: "https://image.tmdb.org/t/p/w500/3bhkrj58Vtu7enYsRolD1fZdja1.jpg", playUrl: "https://so.iqiyi.com/so/q_教父" },
            { id: 8, title: "蝙蝠侠：黑暗骑士", rating: 9.2, type: "动作/犯罪", poster: "https://image.tmdb.org/t/p/w500/qJ2tW6WMUDux911r6m7haRef0WH.jpg", playUrl: "https://so.iqiyi.com/so/q_蝙蝠侠黑暗骑士" },
            { id: 9, title: "这个杀手不太冷", rating: 9.4, type: "动作/剧情", poster: "https://image.tmdb.org/t/p/w500/4uX5wzZbr88uQLIqT3yK6z0JFmH.jpg", playUrl: "https://so.iqiyi.com/so/q_这个杀手不太冷" },
            { id: 10, title: "千与千寻", rating: 9.4, type: "动画/奇幻", poster: "https://image.tmdb.org/t/p/w500/39wmItIWsg5sZMyRUHLkWBcuVCM.jpg", playUrl: "https://so.iqiyi.com/so/q_千与千寻" },
            { id: 11, title: "寻梦环游记", rating: 9.1, type: "动画/冒险", poster: "https://image.tmdb.org/t/p/w500/eKi8dIrr8voobbaGzDpe8w0PVbC.jpg", playUrl: "https://so.iqiyi.com/so/q_寻梦环游记" },
            { id: 12, title: "疯狂动物城", rating: 9.2, type: "动画/喜剧", poster: "https://image.tmdb.org/t/p/w500/sM33SANp9z6rXW8Itn7NnG1GOEs.jpg", playUrl: "https://so.iqiyi.com/so/q_疯狂动物城" },
            { id: 13, title: "流浪地球", rating: 9.2, type: "科幻/灾难", poster: "https://image.tmdb.org/t/p/w500/xBCPdG59uU83r3Lvh9F3hLgW9lJ.jpg", playUrl: "https://so.iqiyi.com/so/q_流浪地球" },
            { id: 14, title: "战狼2", rating: 9.0, type: "动作/战争", poster: "https://image.tmdb.org/t/p/w500/m2z9cM9eH0n5kfC1vV5X8Q7N8aZ.jpg", playUrl: "https://so.iqiyi.com/so/q_战狼2" },
            { id: 15, title: "我不是药神", rating: 9.0, type: "剧情/现实", poster: "https://image.tmdb.org/t/p/w500/3Q94H7V9zxR494FSS6JcRMEW1lL.jpg", playUrl: "https://so.iqiyi.com/so/q_我不是药神" },
            { id: 16, title: "哪吒之魔童降世", rating: 8.9, type: "动画/奇幻", poster: "https://image.tmdb.org/t/p/w500/h4VB6m0RwcicVEZvzftYZyKX80b.jpg", playUrl: "https://so.iqiyi.com/so/q_哪吒之魔童降世" },
            { id: 17, title: "唐人街探案", rating: 8.6, type: "喜剧/悬疑", poster: "https://image.tmdb.org/t/p/w500/8bHLd8g6DwwQz0mD1sB9Y7y4o4E.jpg", playUrl: "https://so.iqiyi.com/so/q_唐人街探案" },
            { id: 18, title: "你好，李焕英", rating: 9.0, type: "喜剧/亲情", poster: "https://image.tmdb.org/t/p/w500/200Xf9o7gybYys8i5K6G38a94kR.jpg", playUrl: "https://so.iqiyi.com/so/q_你好李焕英" },
            { id: 19, title: "误杀", rating: 8.7, type: "悬疑/犯罪", poster: "https://image.tmdb.org/t/p/w500/6D3dK1O9STqHkOv14W41b2Ux6lx.jpg", playUrl: "https://so.iqiyi.com/so/q_误杀" },
            { id: 20, title: "少年的你", rating: 8.7, type: "剧情/校园", poster: "https://image.tmdb.org/t/p/w500/qLmdKa1KO5h70dWRME7dC96x5bS.jpg", playUrl: "https://so.iqiyi.com/so/q_少年的你" }
        ];

        function renderMovieCard(movie) {
            return `<div class="movie-card"><div class="movie-poster"><img src="${movie.poster}" alt="${movie.title}"></div><div class="movie-info"><h3 class="movie-title">${movie.title}</h3><span class="movie-tag">${movie.type}</span><span class="movie-tag">⭐ ${movie.rating}</span></div></div>`;
        }

        function initHeroSlider() {
            const slider = document.getElementById('heroSlider');
            const topMovies = movies.slice(0, 3);
            topMovies.forEach((movie, index) => {
                const slide = document.createElement('div');
                slide.className = `hero-slide ${index === 0 ? 'active' : ''}`;
                slide.style.backgroundImage = `url(${movie.poster})`;
                slide.innerHTML = `<div class="hero-content"><h1 class="hero-title">${movie.title}</h1><p class="hero-desc">评分: ${movie.rating} | ${movie.type}</p><button class="btn btn-primary" onclick="window.open('${movie.playUrl}', '_blank')">立即播放</button></div>`;
                slider.appendChild(slide);
            });
        }

        function renderSections() {
            document.getElementById('newReleasesGrid').innerHTML = movies.slice(0, 6).map(renderMovieCard).join('');
            document.getElementById('topRatedGrid').innerHTML = movies.slice(0, 6).map(renderMovieCard).join('');
        }

        document.addEventListener('DOMContentLoaded', () => {
            initHeroSlider();
            renderSections();
        });
    </script>
</body>
</html>
