<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电影推荐站 - 探索光影世界</title>
    <link rel="stylesheet" href="styles.css?v=2026052801">
</head>
<body>
    <header class="header">
        <div class="header-bg"></div>
        <div class="header-content">
            <h1 class="site-title">🎬 电影推荐站</h1>
            <p class="site-subtitle">探索光影世界，发现精彩故事</p>
        </div>
    </header>

    <nav class="nav">
        <div class="nav-container">
            <ul class="nav-links">
                <li><a href="#" class="nav-link active" data-category="all">全部</a></li>
                <li><a href="#" class="nav-link" data-category="popular">热门推荐</a></li>
                <li><a href="#" class="nav-link" data-category="drama">剧情佳作</a></li>
                <li><a href="#" class="nav-link" data-category="fantasy">奇幻冒险</a></li>
                <li><a href="#" class="nav-link" data-category="animation">动画精选</a></li>
            </ul>
        </div>
    </nav>

    <div class="controls">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索电影...">
            <button id="searchBtn">🔍</button>
        </div>
        <div class="sort-box">
            <select id="sortSelect">
                <option value="rating-desc">评分最高</option>
                <option value="rating-asc">评分最低</option>
                <option value="year-desc">最新</option>
                <option value="year-asc">最早</option>
                <option value="title-asc">名称 A-Z</option>
            </select>
        </div>
    </div>

    <main class="main">
        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>加载中...</p>
        </div>
        <div id="moviesGrid" class="movies-grid"></div>
    </main>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">×</span>
            <div class="modal-body"></div>
        </div>
    </div>

    <div id="lightbox" class="lightbox">
        <span class="lightbox-close">×</span>
        <div class="lightbox-nav">
            <button id="prevBtn">←</button>
            <button id="nextBtn">→</button>
        </div>
        <img id="lightboxImg" src="" alt="">
    </div>

    <footer class="footer">
        <p>© 2026 电影推荐站 | 探索光影世界</p>
    </footer>

    <script src="script.js?v=2026052803"></script>
</body>
</html>
